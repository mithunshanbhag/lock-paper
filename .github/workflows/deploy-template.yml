name: lock-paper-deploy-template

on:
  workflow_call:
    inputs:
      environmentName:
        required: true
        type: string
      runProvisioning:
        required: true
        type: boolean

env:
  ANDROID_RUNTIME_IDENTIFIER: "android-arm64"
  ANDROID_TARGET_FRAMEWORK: "net10.0-android"
  DOTNET_VERSION_10: "10.0.x"
  WINDOWS_TARGET_FRAMEWORK: "net10.0-windows10.0.19041.0"
  RESOURCE_GROUP_NAME: lock-paper-rg
  RESOURCE_LOCK_NAME: lock-paper-rg-delete-lock
  # metadata will be stored, and not where the resource groups will be deployed.
  # You can specify any location for `SUB_DEPLOYMENT_REGION`. It's the region where 
  # the deployment metadata will be stored, and not where the resource groups will be deployed.
  SUB_DEPLOYMENT_REGION: centralindia

jobs:
  provision:
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environmentName }}
    timeout-minutes: 30
    steps:
      - name: checkout code
        uses: actions/checkout@v4.1.1
      - name: azure login
        uses: azure/login@v2.2.0
        with:
          creds: ${{ secrets.SERVICEPRINCIPAL }}
      # temporarily use az cli to upgrade bicep
      # Context: https://github.com/Azure/bicep/issues/16681#issuecomment-2747568200
      - name: upgrade bicep
        uses: azure/CLI@v2.2.0
        with:
          inlineScript: az bicep upgrade
      #
      # section #1: provisioning the resources on Azure using bicep templates
      #
      # The first step is to create the resource group: `lock-paper-rg`.
      # The below step can also be manually executed as follows:
      # az deployment sub create --location {LOCATION} --template-file .\createResourceGroup.bicep
      # Note: You can specify any location for `{LOCATION}`. It's the region where the deployment metadata will be stored, and not
      # where the resource groups will be deployed.
      # @TODO: The 'azure/arm-deploy' action will soon be deprecated. Move to the 'azure/bicep-deploy' github action.
      - name: create resource group
        uses: Azure/arm-deploy@v2
        if: ${{ inputs.runProvisioning == true }}
        with:
          scope: subscription
          region: ${{ env.SUB_DEPLOYMENT_REGION }}
          template: ./infra/createResourceGroup.bicep
          parameters: rgName=${{ env.RESOURCE_GROUP_NAME }} envName=${{ inputs.environmentName }} githubCommitSha=${{ github.sha }} githubWorkflowRunId=${{ github.run_id }} githubRef=${{ github.ref }}


  build-deploy-lock-paper-ui:
    runs-on: windows-2025-vs2026
    environment: ${{ inputs.environmentName }}
    timeout-minutes: 20
    needs: provision
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2
      - name: setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION_10 }}
      - name: dotnet restore
        run: dotnet restore ./LockPaper.slnx --nologo
      - name: run unit tests (ui)
        run: dotnet test ./tests/LockPaper.Ui.UnitTests/LockPaper.Ui.UnitTests.csproj --no-restore --logger trx --results-directory ./tests/LockPaper.Ui.UnitTests/TestResults-${{ github.run_id }}-${{ github.run_attempt }}
      - name: publish unit test results (ui)
        uses: actions/upload-artifact@v4.3.1
        with:
          name: LockPaper.Ui.UnitTests
          path: ./tests/LockPaper.Ui.UnitTests/TestResults-${{ github.run_id }}-${{ github.run_attempt }}
      # temporarily disable windows build to ensure android build finishes quickly for testing purposes, will re-enable in future PRs
      # - name: build lock-paper app (windows)
      #   run: dotnet publish ./src/LockPaper.Ui/LockPaper.Ui.csproj -f ${{ env.WINDOWS_TARGET_FRAMEWORK }} -c Release -o ./Publish/LockPaper.Ui --nologo
      - name: decode android release keystore
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP\lock-paper-release.jks",
            [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}")
          )
      - name: build lock-paper app (android arm64 apk)
        shell: pwsh
        run: |
          dotnet publish ./src/LockPaper.Ui/LockPaper.Ui.csproj `
            -f ${{ env.ANDROID_TARGET_FRAMEWORK }} `
            -c Release `
            -r ${{ env.ANDROID_RUNTIME_IDENTIFIER }} `
            -p:AndroidPackageFormat=apk `
            -p:ApplicationVersion=${{ github.run_number }} `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore="$env:RUNNER_TEMP\lock-paper-release.jks" `
            -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" `
            -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" `
            -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" `
            -o ./Publish/LockPaper.Ui.Android `
            --nologo
      - name: delete decoded keystore
        shell: pwsh
        run: Remove-Item -Path "$env:RUNNER_TEMP\lock-paper-release.jks" -Force
      - name: collect lock-paper app artifact (android apk)
        shell: pwsh
        run: |
          $searchPaths = @(
            "./Publish/LockPaper.Ui.Android",
            "./src/LockPaper.Ui/bin/Release/${{ env.ANDROID_TARGET_FRAMEWORK }}/publish",
            "./src/LockPaper.Ui/bin/Release/${{ env.ANDROID_TARGET_FRAMEWORK }}"
          )

          $apk = $null
          foreach ($path in $searchPaths) {
            if (-not (Test-Path $path)) {
              continue
            }

            $apk = Get-ChildItem -Path $path -Filter "*-Signed.apk" -File -Recurse | Select-Object -First 1
            if ($apk) {
              break
            }
          }

          if (-not $apk) {
            throw "No signed APK was generated."
          }

          New-Item -ItemType Directory -Path ./Publish/LockPaper.Ui.Android.Apk -Force | Out-Null
          Copy-Item -Path $apk.FullName -Destination ./Publish/LockPaper.Ui.Android.Apk/
      - name: publish lock-paper app artifact (android apk)
        uses: actions/upload-artifact@v4.3.1
        with:
          name: LockPaper.Ui.Android.apk
          path: ./Publish/LockPaper.Ui.Android.Apk/*.apk
          if-no-files-found: error
