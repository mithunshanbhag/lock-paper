<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LockPaper Connected Mockup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="canvas">
    <section class="device-frame" aria-label="LockPaper connected screen mockup">
      <div class="screen">
        <header class="screen-header">
          <div class="heading-row">
            <h1>LockPaper</h1>
            <button class="logout-trigger" type="button" aria-label="Open log out confirmation dialog">✓</button>
          </div>

          <div class="account-bar" aria-label="Connected Microsoft account summary">
            <span class="account-chip" title="mithunshanbhag@hotmail.com">mithunshanbhag@hotmail.com</span>
          </div>
        </header>

        <section class="surface surface--hero" aria-label="Current display summary">
          <div class="surface-head">
            <div>
              <p class="eyebrow">Current screen</p>
              <p class="surface-meta">1080 x 2340</p>
            </div>
            <button class="refresh-fab" type="button" aria-label="Refresh lock screen" title="Refresh lock screen">
              <span class="refresh-fab__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M18 8a7 7 0 1 0 1.4 7.3" />
                  <path d="M18 3v5h-5" />
                </svg>
              </span>
              <span class="refresh-fab__spinner" aria-hidden="true"></span>
            </button>
          </div>

          <div class="display-stage">
            <div class="display-rectangle display-rectangle--phone">1080 x 2340</div>
          </div>
        </section>

        <section class="surface" aria-label="Refresh activity summary">
          <div class="status-row">
            <div>
              <p class="eyebrow">Last update</p>
              <p class="status-primary">6:36 pm</p>
            </div>
            <span class="status-success-icon" aria-label="Last update succeeded">✓</span>
          </div>

          <div class="divider" aria-hidden="true"></div>

          <div class="status-row">
            <div>
              <p class="eyebrow">Next</p>
              <p class="status-primary">Manual only for now</p>
            </div>
            <span class="status-note">Hourly later</span>
          </div>
        </section>
      </div>
    </section>
  </main>

  <dialog class="confirm-dialog" aria-labelledby="logout-dialog-title">
    <form method="dialog" class="dialog-card">
      <h2 id="logout-dialog-title">Log out?</h2>
      <p>This will disconnect LockPaper from OneDrive on this device.</p>
      <div class="dialog-actions">
        <button class="secondary-action" type="submit" value="cancel">Cancel</button>
        <button class="danger-action" type="submit" value="confirm">Log out</button>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
