<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LockPaper Connected Mockup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="canvas">
    <section class="device-frame" aria-label="LockPaper connected screen mockup">
      <div class="screen">
        <header class="screen-header">
          <div class="heading-row">
            <h1>LockPaper</h1>
            <button class="logout-trigger" type="button" aria-label="Open log out confirmation dialog">✓</button>
          </div>
        </header>

        <button class="primary-action" type="button">Change now</button>

        <section class="status-card">
          <p class="label">Microsoft account</p>
          <p class="value">family@example.com</p>
        </section>

        <section class="status-card">
          <p class="label">Display summary</p>
          <div class="display-summary-panel" aria-label="Connected device display summary">
            <div class="display-previews">
              <article class="display-preview">
                <div class="display-rectangle display-rectangle--primary">2560 x 1440</div>
              </article>

              <article class="display-preview">
                <div class="display-rectangle display-rectangle--secondary">1080 x 1920</div>
              </article>
            </div>
          </div>
        </section>

        <section class="status-card">
          <p class="label">Last attempt</p>
          <p class="value">Not available yet</p>
        </section>

        <section class="status-card">
          <p class="label">Next attempt</p>
          <p class="value">Waiting for wallpaper scheduling</p>
        </section>
      </div>
    </section>
  </main>

  <dialog class="confirm-dialog" aria-labelledby="logout-dialog-title">
    <form method="dialog" class="dialog-card">
      <h2 id="logout-dialog-title">Log out?</h2>
      <p>This will disconnect LockPaper from OneDrive on this device.</p>
      <div class="dialog-actions">
        <button class="secondary-action" type="submit" value="cancel">Cancel</button>
        <button class="danger-action" type="submit" value="confirm">Log out</button>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
